<!DOCTYPE html>

<title>Glimpses | HealthCRAD</title>
<link rel="shortcut icon" href="img/HealthCRAD-Logo.png" type="image/x-icon">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",sans-serif}
body{background:#f5f7fa;color:#333}

/* HERO */
.hero{
    background:linear-gradient(135deg,#d8f8ff,#e7f4f7);
    padding:80px 20px;
    text-align:center
}
.hero h1{font-size:42px;color:#13C7EB;margin-bottom:12px}
.hero p{max-width:700px;margin:auto;font-size:18px;color:#555}

/* GALLERY */
.gallery-container{max-width:1200px;margin:60px auto;padding:0 20px}
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px
}
.gallery-card{
    position:relative;
    overflow:hidden;
    border-radius:18px;
    background:#fff;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
    cursor:pointer
}
.gallery-card img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:.5s
}
.gallery-card:hover img{transform:scale(1.1)}
.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.55);
    opacity:0;
    transition:.4s;
    pointer-events:none
}
.gallery-card:hover .overlay{opacity:1}

/* LIGHTBOX */
.lightbox{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.85);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:9999
}
.lightbox img{
    max-width:90%;
    max-height:90%;
    border-radius:12px
}
.lightbox span{
    position:absolute;
    top:20px;
    right:30px;
    font-size:32px;
    color:#fff;
    cursor:pointer
}

footer{
    text-align:center;
    padding:30px;
    background:#fff;
    color:#13C7EB
}
</style>
</head>
